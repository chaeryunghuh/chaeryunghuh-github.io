
    <!DOCTYPE html>
    <html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>MA 프로젝트 개발 진척률</title>
        
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif; margin: 20px; background-color: #f8f9fa; }
        .dashboard-container { background-color: white; border: 1px solid #dee2e6; border-radius: 8px; padding: 24px; max-width: 800px; margin: auto; }
        h1 { font-size: 24px; color: #343a40; border-bottom: 2px solid #0052cc; padding-bottom: 10px; }
        h1 .updated-time { font-size: 14px; color: #6c757d; font-weight: normal; }
        .progress-section { margin-top: 30px; }
        .progress-title { font-size: 16px; font-weight: bold; color: #495057; margin-bottom: 12px; }
        .progress-bar-container { display: flex; align-items: center; height: 28px; background-color: #e9ecef; border-radius: 6px; overflow: hidden; font-size: 14px; position: relative; }
        .progress-bar { background-color: #0052cc; height: 100%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; transition: width 0.5s ease-in-out; }
        .progress-label-inside { position: absolute; left: 10px; color: white; font-weight: bold; }
        .progress-label-outside { position: absolute; right: 10px; color: #495057; }
        .progress-meta { text-align: right; margin-top: 8px; font-size: 12px; color: #6c757d; }
        .error-message { color: red; font-weight: bold; margin-top: 20px; }
    </style>
    
    </head>
    <body>
        <div class="dashboard-container">
            <h1>MA 프로젝트 개발 진척률 <span class="updated-time">(데이터 기준: 2026-03-19 11:35:31)</span></h1>
            
        <div class="progress-section">
            <div class="progress-title">개발 경과 일정 (계획)</div>
            <div class="progress-bar-container">
                <div class="progress-bar" style="width: 2.8%;"><span class="progress-label-inside">2.8%</span></div>
                <span class="progress-label-outside">97.2%</span>
            </div>
            <div class="progress-meta">경과: 0개월 3일 / 남은 일정: 3개월 12일 (오늘 날짜 기준: 2026-03-19)</div>
        </div>
        <div class="progress-section">
            <div class="progress-title">실제 달성률 (Epic 기준)</div>
            <div class="progress-bar-container">
                <div class="progress-bar" style="width: 3.2%;"><span class="progress-label-inside">3.2%</span></div>
                 <span class="progress-label-outside">96.8%</span>
            </div>
            <div class="progress-meta">완료 Epic: 3 / 전체 Epic: 94</div>
        </div>
        
        </div>
    </body>
    </html>
