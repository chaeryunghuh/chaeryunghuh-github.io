
    <!DOCTYPE html>
    <html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>구현 목표 변동 사항</title>
        
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; margin: 20px; background-color: #f8f9fa; }
        ul { list-style-type: none; padding-left: 0; }
        li { background-color: #fff; border: 1px solid #ddd; margin-bottom: 8px; padding: 12px; border-radius: 5px; }
        a { color: #007bff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .ontrack { color: #28a745; font-weight: bold; }
        .no-changes { padding: 12px; background-color: #fff; border: 1px solid #ddd; border-radius: 5px; }
    </style>
    
    </head>
    <body>
        <div class="no-changes"><span class="ontrack">[OnTrack]</span> 변동 사항이 없습니다.</div>
    </body>
    </html>
